    - code: "SAVE20"
      discount_type: "percentage"
      discount_value: 20
      min_order: 100
    - code: "FLAT50"
      discount_type: "fixed"
      discount_value: 50
      min_order: 200
  
  invalid:
    - code: "EXPIRED2023"
