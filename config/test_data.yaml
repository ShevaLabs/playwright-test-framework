# Security Test Data
security:
  sql_injection:
    - "' OR '1'='1"
    - "'; DROP TABLE users; --"
    - "' UNION SELECT * FROM users--"
    - "admin'--"
    - "1' OR '1' = '1"
  
  xss_payloads:
    - "<script>alert('xss')</script>"
    - "<img src=x onerror=alert('xss')>"
    - "javascript:alert('xss')"
    - "<svg onload=alert('xss')>"
  
  special_characters:
    - "user@#$%^&*()"
    - "user<>?/\\|"
    - "user{}[]"
    - "user`~"

# Email Test Data
emails:
  valid:
    - "test@example.com"
    - "user.name@example.co.uk"
    - "user+label@example.com"
    - "123@example.com"
    - "user@subdomain.example.com"
  
  invalid:
