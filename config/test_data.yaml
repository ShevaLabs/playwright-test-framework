# File Upload Test Data
file_uploads:
  valid:
    - name: "valid_image.jpg"
      type: "image/jpeg"
      size_kb: 100
    - name: "valid_document.pdf"
      type: "application/pdf"
      size_kb: 500
    - name: "valid_text.txt"
      type: "text/plain"
      size_kb: 10
  
  invalid:
    - name: "malicious.exe"
      type: "application/x-msdownload"
      expected_error: "File type not allowed"
    - name: "large_file.mp4"
      size_mb: 100
      expected_error: "File size exceeds limit"
    - name: "script.js"
      type: "application/javascript"
      expected_error: "File type not allowed"