[pytest]
# Test paths
testpaths = tests

# Python files
python_files = test_*.py

# Python classes
python_classes = Test*

# Python functions
python_functions = test_*

# Markers
markers =
    smoke: Smoke tests
    regression: Regression tests
    boundary: Boundary tests
    performance: Performance tests
    api: API tests
    ui: UI tests
    slow: Slow running tests

# Command line options
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --maxfail=5

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout
timeout = 300
timeout_method = thread

# Performance test markers
markers =
    performance: Performance and load tests
    slow: Long-running tests

# Performance test specific settings
timeout = 600  # 10 minutes timeout for performance tests
timeout_method = thread

# Add performance test directory
testpaths = tests/performance tests/api tests/ui

# Performance test filtering
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    --maxfail=5
    -p no:cacheprovider